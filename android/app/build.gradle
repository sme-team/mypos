plugins {
    id("com.android.application")
    id("org.jetbrains.kotlin.android")
    id("com.facebook.react")
}

react {
    // Giữ nguyên config của bạn, không cần thay đổi
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.mypos"
    defaultConfig {
        applicationId "com.mypos"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
    // ❌ ĐÃ XÓA: buildscript block sai chỗ (không được đặt trong android {})
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation project(":react-native-async-storage_async-storage")
    implementation project(":react-native-bootsplash")
    implementation project(":react-native-randombytes")
    implementation project(":react-native-safe-area-context")
    implementation project(":react-native-sqlite-storage")
    implementation project(":react-native-vector-icons")
    implementation project(':react-native-image-picker')
    // ✅ THÊM: Google Sign-In native dependency
    implementation project(':react-native-google-signin_google-signin')
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"
// ✅ THÊM: Google Services plugin (phải ở cuối file)
apply plugin: 'com.google.gms.google-services'